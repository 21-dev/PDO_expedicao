let supabaseClient = null;
let isDataLoaded = false;
let currentSession = null;

function getSupabaseClient() {
    if (supabaseClient) return supabaseClient;
    if (!window.supabase || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('COLE_SUA_CHAVE')) return null;
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
        }
    });
    return supabaseClient;
}

function loadLocalArray(key, fallback) {
    try {
        const parsed = JSON.parse(localStorage.getItem(key));
        return Array.isArray(parsed) ? parsed : JSON.parse(JSON.stringify(fallback));
    } catch (error) {
        return JSON.parse(JSON.stringify(fallback));
    }
}

function getFallbackState() {
    return {
        collaborators: loadLocalArray(STORAGE_COLLABORATORS, initialCollaborators).map(normalizeCollaborator),
        competencies: loadLocalArray(STORAGE_COMPETENCIES, initialCompetencies).map(normalizeCompetency)
    };
}

async function loadData() {
    const client = getSupabaseClient();
    if (!client) {
        db = getFallbackState();
        isDataLoaded = true;
        showToast('Configure a chave anon do Supabase para carregar o banco.', 'error');
        return;
    }

    try {
        const { data, error } = await client
            .from(SUPABASE_STATE_TABLE)
            .select('state_key,state_value')
            .in('state_key', [APP_STATE_COLLABORATORS, APP_STATE_COMPETENCIES]);

        if (error) throw error;

        const rows = Object.fromEntries((data || []).map(row => [row.state_key, row.state_value]));
        const localFallback = getFallbackState();
        const collaborators = Array.isArray(rows[APP_STATE_COLLABORATORS])
            ? rows[APP_STATE_COLLABORATORS]
            : localFallback.collaborators;
        const competencies = Array.isArray(rows[APP_STATE_COMPETENCIES])
            ? rows[APP_STATE_COMPETENCIES]
            : localFallback.competencies;

        db = {
            collaborators: collaborators.map(normalizeCollaborator),
            competencies: competencies.map(normalizeCompetency)
        };

        if (!rows[APP_STATE_COLLABORATORS] || !rows[APP_STATE_COMPETENCIES]) {
            await saveData(false);
        }

        isDataLoaded = true;
    } catch (error) {
        console.error('Erro ao carregar Supabase:', error);
        db = getFallbackState();
        isDataLoaded = true;
        showToast(`Erro ao carregar Supabase: ${error.message}`, 'error');
    }
}

function normalizeCollaborator(c) {
    return {
        ...c,
        sector: sectorsList.includes(c.sector) ? c.sector : SECTOR_EXPEDICAO,
        warnings: c.warnings || [],
        trainings: c.trainings || [],
        history: c.history || [],
        scores: c.scores || {},
        gaps: c.gaps || [],
        absenteismo: c.absenteismo || [],
        feedbacks: c.feedbacks || []
    };
}

function normalizeCompetency(c) {
    return {
        ...c,
        sector: sectorsList.includes(c.sector) ? c.sector : SECTOR_EXPEDICAO,
        mandatory: Boolean(c.mandatory)
    };
}

function sectorLabel(sector) {
    return sector === SECTOR_OUTBOUND ? 'Outbound' : 'Expedicao';
}

function sectorOptions(selected, includeAllLabel = '') {
    return `${includeAllLabel ? `<option value="">${includeAllLabel}</option>` : ''}${sectorsList.map(s => `<option value="${s}" ${selected === s ? 'selected' : ''}>${sectorLabel(s)}</option>`).join('')}`;
}

function getActiveCollaboratorsBySector(sector) {
    return db.collaborators.filter(c => c.status !== 'Desligado' && c.sector === sector);
}

function getCompetenciesBySector(sector) {
    return db.competencies.filter(c => c.sector === sector);
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    }[char]));
}

function todayBr() {
    return new Date().toLocaleDateString('pt-BR');
}

function formatDateBr(value) {
    if (!value) return '-';
    if (String(value).includes('/')) return value;
    const parts = String(value).split('-');
    if (parts.length !== 3) return value;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

async function saveData(showSuccess = false) {
    const client = getSupabaseClient();
    if (!client) {
        showToast('Configure a chave anon do Supabase antes de salvar.', 'error');
        return false;
    }
    if (!currentSession) {
        showToast('Sessao expirada. Entre novamente para salvar.', 'error');
        await checkAuth();
        return false;
    }

    const payload = [
        { state_key: APP_STATE_COLLABORATORS, state_value: db.collaborators, updated_at: new Date().toISOString() },
        { state_key: APP_STATE_COMPETENCIES, state_value: db.competencies, updated_at: new Date().toISOString() }
    ];
    const { error } = await client
        .from(SUPABASE_STATE_TABLE)
        .upsert(payload, { onConflict: 'state_key' });

    if (error) {
        console.error('Erro ao salvar Supabase:', error);
        showToast(`Erro ao salvar no Supabase: ${error.message}`, 'error');
        return false;
    }

    if (showSuccess) showToast('Dados salvos no Supabase.');
    return true;
}

function createIcons(root) {
    if (window.lucide) lucide.createIcons(root ? { root } : undefined);
}

function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const isError = type === 'error';
    toast.className = `p-3 rounded-lg flex items-center shadow-md transform transition-all translate-y-10 opacity-0 ${
        isError ? 'bg-red-100 border border-red-300 text-red-800' : 'bg-green-100 border border-green-300 text-green-800'
    }`;
    toast.innerHTML = `
        <i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="mr-2 w-5 h-5"></i>
        <span>${escapeHtml(msg)}</span>
    `;
    container.appendChild(toast);
    createIcons(toast);
    setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
    setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.remove(), 300);
    }, 3500);
}

function renderLoadingState(message = 'Carregando dados do Supabase...') {
    renderNav();
    const container = document.getElementById('app-content');
    container.innerHTML = `

                <span class="font-medium">${escapeHtml(message)}</span>

    `;

}

async function checkAuth() {
    const client = getSupabaseClient();
    if (!client) {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('app-view').classList.add('hidden');
        showToast('Supabase nao configurado.', 'error');
        createIcons();
        return;
    }

    const { data, error } = await client.auth.getSession();
    if (error) {
        console.error('Erro ao verificar sessao:', error);
        showToast('Nao foi possivel verificar a sessao.', 'error');
    }

    currentSession = data?.session || null;
    const isLogged = Boolean(currentSession);
    document.getElementById('login-view').classList.toggle('hidden', isLogged);
    document.getElementById('app-view').classList.toggle('hidden', !isLogged);
    if (isLogged) {
        if (!isDataLoaded) {
            renderLoadingState();
            await loadData();
        }
        renderApp();
    }
    createIcons();
}

async function doLogin(event) {
    event.preventDefault();
    const client = getSupabaseClient();
    if (!client) {
        showToast('Supabase nao configurado.', 'error');
        return;
    }

    const email = document.getElementById('login_user').value.trim();
    const password = document.getElementById('login_pass').value;
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
        showToast('Email ou senha incorretos.', 'error');
        return;
    }

    currentSession = data.session;
    isDataLoaded = false;
    showToast('Bem-vindo ao Gestao PDO!');
    await checkAuth();
}

async function doLogout() {
    const client = getSupabaseClient();
    if (client) await client.auth.signOut();
    currentSession = null;
    isDataLoaded = false;
    document.getElementById('login_user').value = '';
    document.getElementById('login_pass').value = '';
    await checkAuth();
}

function scoreToLevel(score) {
    if (score > 0 && score <= 2) return 1;
    if (score > 2 && score <= 4) return 2;
    if (score > 4) return 3;
    return 0;
}

function levelLabel(level) {
    return {
        0: 'Nao treinado (N0)',
        1: 'Em treino (N1)',
        2: 'Autonomo (N2)',
        3: 'Especialista (N3)'
    }[level] || 'Nao treinado (N0)';
}

function renderDashboard() {
    const active = db.collaborators.filter(c => c.status !== 'Desligado');

    const alerts = [];
    db.competencies.forEach(comp => {
        const sectorActive = active.filter(c => c.sector === comp.sector);
        const specialistsCount = sectorActive.filter(c => c.scores[comp.id] === 3).length;
        const trainingCount = sectorActive.filter(c => c.scores[comp.id] === 1).length;
        const sector = sectorLabel(comp.sector);
        if (specialistsCount < 2) alerts.push({ type: 'danger', msg: `[${sector}] A competencia "${comp.name}" possui apenas ${specialistsCount} especialista(s).` });
        if (specialistsCount > 0 && trainingCount === 0) alerts.push({ type: 'warning', msg: `[${sector}] O processo "${comp.name}" nao possui sucessao em treinamento.` });
    });

    const dangerCount = alerts.filter(a => a.type === 'danger').length;
    const sectorStats = sectorsList.map(sector => {
        const people = getActiveCollaboratorsBySector(sector);
        return {
            sector,
            collaborators: people.length,
            specialists: people.filter(c => Object.values(c.scores).some(score => score === 3)).length,
            inTraining: people.filter(c => Object.values(c.scores).some(score => score === 1)).length
        };
    });

    return `
        <div class="space-y-6 animate-fade-in">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-2">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800">Gestao PDO - Expedicao e Outbound</h2>
                    <p class="text-sm text-slate-500">Visao separada por Expedicao e Outbound, com alertas consolidados.</p>
                </div>
                <div class="bg-white border border-slate-200 rounded-lg px-4 py-3 shadow-sm flex items-center gap-2 text-red-600">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    <span class="text-sm font-semibold">${dangerCount} alertas criticos</span>
                </div>
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                ${sectorStats.map(stat => `
                    <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 md:p-5">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold text-slate-800">${sectorLabel(stat.sector)}</h3>
                            <span class="text-xs uppercase tracking-wide text-slate-500 bg-slate-100 px-2 py-1 rounded">${stat.sector}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="rounded-lg border border-blue-100 bg-blue-50 p-3 text-center">
                                <i data-lucide="users" class="text-blue-500 mb-1 w-5 h-5 mx-auto"></i>
                                <div class="text-2xl font-bold text-slate-800">${stat.collaborators}</div>
                                <div class="text-xs text-slate-500">Colaboradores</div>
                            </div>
                            <div class="rounded-lg border border-green-100 bg-green-50 p-3 text-center">
                                <i data-lucide="award" class="text-green-500 mb-1 w-5 h-5 mx-auto"></i>
                                <div class="text-2xl font-bold text-slate-800">${stat.specialists}</div>
                                <div class="text-xs text-slate-500">Especialistas</div>
                            </div>
                            <div class="rounded-lg border border-yellow-100 bg-yellow-50 p-3 text-center">
                                <i data-lucide="clock" class="text-yellow-500 mb-1 w-5 h-5 mx-auto"></i>
                                <div class="text-2xl font-bold text-slate-800">${stat.inTraining}</div>
                                <div class="text-xs text-slate-500">Em treino</div>
                            </div>
                        </div>
                    </section>
                `).join('')}
            </div>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 md:p-6">
                <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center">
                    <i data-lucide="alert-triangle" class="mr-2 text-orange-500 w-5 h-5"></i>
                    Alertas do Sistema
                </h3>
                <div class="space-y-3">
                    ${alerts.length ? alerts.map(alert => `
                        <div class="p-3 md:p-4 rounded-lg flex items-start text-sm md:text-base ${alert.type === 'danger' ? 'bg-red-50 border border-red-200 text-red-800' : 'bg-yellow-50 border border-yellow-200 text-yellow-800'}">
                            <i data-lucide="alert-triangle" class="mr-3 shrink-0 ${alert.type === 'danger' ? 'text-red-500' : 'text-yellow-500'} w-5 h-5"></i>
                            <span>${escapeHtml(alert.msg)}</span>
                        </div>
                    `).join('') : `
                        <div class="p-4 bg-green-50 border border-green-200 text-green-800 rounded-lg flex items-center text-sm md:text-base">
                            <i data-lucide="check-circle" class="mr-2 shrink-0 w-5 h-5"></i>
                            Operacao saudavel. Nenhum alerta critico no momento.
                        </div>
                    `}
                </div>
            </div>
        </div>
    `;
}

function getSelectedColab() {
    return db.collaborators.find(c => c.id === uiState.selectedColabId) || null;
}

function cadViewColab(id) {
    uiState.selectedColabId = id;
    uiState.isEditingColab = false;
    renderApp();
}

function cadBackList() {
    uiState.selectedColabId = null;
    uiState.isEditingColab = false;
    renderApp();
}

function cadEditColab() {
    const colab = getSelectedColab();
    if (!colab) return;
    uiState.editColabForm = JSON.parse(JSON.stringify(colab));
    uiState.editColabForm.trainingsText = uiState.editColabForm.trainings.join(', ');
    uiState.isEditingColab = true;
    uiState.showDeleteColabConfirm = false;
    renderApp();
}

function cadCancelEdit() {
    uiState.isEditingColab = false;
    uiState.editColabForm = null;
    renderApp();
}

function cadUpdateField(field, value) {
    uiState.editColabForm[field] = value;
}

function cadSetSectorFilter(value) {
    uiState.filterSector = value;
    renderApp();
}

function cadAddWarning() {
    const input = document.getElementById('newWarningInput');
    const reason = input.value.trim();
    if (!reason) return;
    uiState.editColabForm.warnings.push({ date: todayBr(), reason });
    input.value = '';
    renderApp();
}

function cadRemoveWarning(index) {
    uiState.editColabForm.warnings.splice(index, 1);
    renderApp();
}

async function cadSaveColab(event) {
    event.preventDefault();
    const form = uiState.editColabForm;
    const updatedColab = normalizeCollaborator({
        ...form,
        trainings: form.trainingsText.split(',').map(t => t.trim()).filter(Boolean),
        history: [{ date: todayBr(), event: 'Dados da ficha atualizados' }, ...form.history]
    });
    delete updatedColab.trainingsText;
    db.collaborators = db.collaborators.map(c => c.id === updatedColab.id ? updatedColab : c);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = updatedColab.id;
    uiState.isEditingColab = false;
    uiState.editColabForm = null;
    showToast('Ficha atualizada com sucesso!');
    renderApp();
}

function cadShowDeleteConfirm(show) {
    uiState.showDeleteColabConfirm = show;
    renderApp();
}

async function cadDeleteColab() {
    db.collaborators = db.collaborators.filter(c => c.id !== uiState.selectedColabId);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = null;
    uiState.isEditingColab = false;
    showToast('Colaborador removido.');
    renderApp();
}

function compEditClick(id) {
    uiState.editingCompId = id;
    uiState.editCompForm = { ...db.competencies.find(c => c.id === id) };
    uiState.showDeleteCompConfirm = null;
    renderApp();
}

function compUpdateField(field, value) {
    uiState.editCompForm[field] = value;
}

function compUpdateMandatory(value) {
    uiState.editCompForm.mandatory = value === 'true';
}

async function compSave() {
    if (!uiState.editCompForm.name.trim()) return;
    db.competencies = db.competencies.map(c => c.id === uiState.editingCompId ? normalizeCompetency(uiState.editCompForm) : c);
    const saved = await saveData();
    if (!saved) return;
    uiState.editingCompId = null;
    uiState.editCompForm = null;
    showToast('Competencia atualizada.');
    renderApp();
}

function compCancelEdit() {
    uiState.editingCompId = null;
    uiState.editCompForm = null;
    renderApp();
}

function compShowDelete(id) {
    uiState.showDeleteCompConfirm = id;
    renderApp();
}

async function compDelete(id) {
    db.competencies = db.competencies.filter(c => c.id !== id);
    db.collaborators = db.collaborators.map(c => {
        const scores = { ...c.scores };
        delete scores[id];
        return { ...c, scores };
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.showDeleteCompConfirm = null;
    uiState.editingCompId = null;
    showToast('Competencia removida.');
    renderApp();
}

function renderPolivalencia(sector = SECTOR_EXPEDICAO) {
    const competencies = getCompetenciesBySector(sector);
    const ranking = db.collaborators.filter(c => c.sector === sector).map(c => {
        const masteredCount = competencies.filter(comp => (c.scores[comp.id] || 0) >= 2).length;
        const percent = masteredCount / (competencies.length || 1);
        const stars = percent >= 0.8 ? 5 : percent >= 0.6 ? 4 : percent >= 0.4 ? 3 : percent >= 0.2 ? 2 : percent > 0 ? 1 : 0;
        return { ...c, masteredCount, stars };
    }).sort((a, b) => b.masteredCount - a.masteredCount);

    return `
        <div class="space-y-4 md:space-y-6 animate-fade-in">
            <h2 class="text-xl md:text-2xl font-bold text-slate-800">Ranking de Polivalencia - ${sectorLabel(sector)}</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                ${ranking.map((colab, index) => `
                    <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col relative overflow-hidden">
                        ${index === 0 ? '<div class="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-bl-lg">#1</div>' : ''}
                        <h3 class="text-base md:text-lg font-bold text-slate-800 pr-12">${escapeHtml(colab.name)}</h3>
                        <p class="text-xs md:text-sm text-slate-500 mb-4">${escapeHtml(colab.role)}</p>
                        <div class="flex items-center mb-2">
                            <span class="text-3xl font-bold text-blue-600 mr-2">${colab.masteredCount}</span>
                            <span class="text-sm text-slate-600">competencias dominadas<br>(nivel 2 ou 3)</span>
                        </div>
                        <div class="flex text-yellow-400 mt-auto pt-4 border-t border-slate-100">
                            ${Array.from({ length: 5 }).map((_, i) => `<i data-lucide="star" class="w-5 h-5 ${i < colab.stars ? 'fill-current text-yellow-400' : 'text-slate-200'}"></i>`).join('')}
                        </div>
                    </div>
                `).join('') || '<div class="bg-white border border-slate-200 rounded-xl p-8 text-center text-slate-500">Nenhum colaborador encontrado para este setor.</div>'}
            </div>
        </div>
    `;
}

function absenteeismHandleFile(input) {
    const file = input.files[0];
    if (!file) {
        uiState.tempAbsenteismoImage = null;
        return;
    }
    if (file.type === 'application/pdf') {
        showToast('PDF selecionado. Para visualizacao, prefira imagem.', 'error');
        uiState.tempAbsenteismoImage = null;
        return;
    }
    const reader = new FileReader();
    reader.onload = event => { uiState.tempAbsenteismoImage = event.target.result; };
    reader.readAsDataURL(file);
}

function absenteeismToggleOutro(checkbox) {
    const input = document.getElementById('absOutroObs');
    input.disabled = !checkbox.checked;
    if (!checkbox.checked) input.value = '';
    if (checkbox.checked) input.focus();
}

async function absenteeismSubmit(event) {
    event.preventDefault();
    const colabId = document.getElementById('absColab').value;
    const date = document.getElementById('absDate').value;
    const justificados = Array.from(document.querySelectorAll('input[name="justificado"]:checked')).map(el => el.value);
    const naoJustificados = Array.from(document.querySelectorAll('input[name="naoJustificado"]:checked')).map(el => el.value);
    const outroObs = document.getElementById('absOutroObs').value.trim();

    if (!colabId || !date) {
        showToast('Preencha colaborador e data.', 'error');
        return;
    }
    if (!justificados.length && !naoJustificados.length) {
        showToast('Selecione ao menos um motivo.', 'error');
        return;
    }
    const finalJustificados = justificados.map(value => value === 'Outro' && outroObs ? `Outro: ${outroObs}` : value);
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== colabId) return c;
        return normalizeCollaborator({
            ...c,
            absenteismo: [...c.absenteismo, { date, justificados: finalJustificados, naoJustificados, image: uiState.tempAbsenteismoImage }],
            history: [{ date: todayBr(), event: 'Entrevista de absenteismo registrada' }, ...c.history]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.tempAbsenteismoImage = null;
    showToast('Entrevista gravada com sucesso!');
    event.target.reset();
}

function adminSetTab(tab) {
    uiState.activeAdminTab = tab;
    renderApp();
}

function adminEvalColabChange(value) {
    uiState.evalColabId = value;
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminEvalCompChange(value) {
    uiState.evalCompId = value;
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminSetEvalSector(value) {
    uiState.evalSector = value;
    uiState.evalColabId = '';
    uiState.evalCompId = '';
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminSetGapSector(value) {
    uiState.gapSector = value;
    renderApp();
}

function adminSetFeedbackSector(value) {
    uiState.feedbackSector = value;
    renderApp();
}

function adminToggleCheck(id) {
    if (uiState.evalCheckedItems.has(id)) uiState.evalCheckedItems.delete(id);
    else uiState.evalCheckedItems.add(id);
    renderApp();
}

async function adminSaveEval(event) {
    event.preventDefault();
    if (!uiState.evalColabId || !uiState.evalCompId) {
        showToast('Selecione colaborador e competencia.', 'error');
        return;
    }
    const level = scoreToLevel(uiState.evalCheckedItems.size);
    const compName = db.competencies.find(comp => comp.id === uiState.evalCompId)?.name || 'Competencia';
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== uiState.evalColabId) return c;
        return normalizeCollaborator({
            ...c,
            scores: { ...c.scores, [uiState.evalCompId]: level },
            history: [{ date: todayBr(), event: `Avaliacao: ${compName} - ${levelLabel(level)}` }, ...c.history]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.evalCheckedItems.clear();
    showToast('Avaliacao salva com sucesso.');
    renderApp();
}

async function adminAddColab(event) {
    event.preventDefault();
    const name = document.getElementById('newColabName').value.trim();
    if (!name) return;
    const newColab = normalizeCollaborator({
        id: `col${Date.now()}`,
        name,
        role: document.getElementById('newColabRole').value,
        sector: document.getElementById('newColabSector').value,
        shift: document.getElementById('newColabShift').value,
        admission: document.getElementById('newColabAdmissao').value || new Date().toISOString().split('T')[0],
        status: 'Ativo',
        timeInRole: 'Recem adicionado',
        warnings: [],
        trainings: [],
        history: [{ date: todayBr(), event: 'Adicionado via sistema' }],
        scores: {},
        gaps: [],
        absenteismo: [],
        feedbacks: []
    });
    db.collaborators.push(newColab);
    const saved = await saveData();
    if (!saved) return;
    showToast('Colaborador adicionado com sucesso.');
    event.target.reset();
    renderApp();
}

async function adminAddComp(event) {
    event.preventDefault();
    const name = document.getElementById('newCompName').value.trim();
    if (!name) return;
    db.competencies.push({
        id: `c${Date.now()}`,
        name,
        sector: document.getElementById('newCompSector').value,
        category: document.getElementById('newCompCategory').value,
        mandatory: document.getElementById('newCompMandatory').value === 'true'
    });
    const saved = await saveData();
    if (!saved) return;
    showToast('Competencia adicionada com sucesso.');
    event.target.reset();
    renderApp();
}

async function adminAddGap(event) {
    event.preventDefault();
    const colabId = document.getElementById('gapColab').value;
    if (!colabId) return;
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== colabId) return c;
        return normalizeCollaborator({
            ...c,
            gaps: [...c.gaps, {
                date: todayBr(),
                gap: document.getElementById('gapText').value,
                impact: document.getElementById('gapImpact').value,
                measure: document.getElementById('gapMeasure').value || 'Nenhuma medida registrada.'
            }]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    showToast('Gap enviado para a ficha.');
    event.target.reset();
    renderApp();
}

async function adminAddFeedback(event) {
    event.preventDefault();
    const colabId = document.getElementById('fbColab').value;
    if (!colabId) return;
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== colabId) return c;
        return normalizeCollaborator({
            ...c,
            feedbacks: [...c.feedbacks, {
                date: todayBr(),
                deuCerto: document.getElementById('fbDeuCerto').value,
                travando: document.getElementById('fbTravando').value,
                ajuda: document.getElementById('fbAjuda').value,
                reconhecimento: document.getElementById('fbReconhecimento').value,
                pontoAjuste: document.getElementById('fbPontoAjuste').value,
                comece: document.getElementById('fbComece').value,
                pare: document.getElementById('fbPare').value,
                continuar: document.getElementById('fbContinue').value,
                acaoPrincipal: document.getElementById('fbAcaoPrincipal').value,
                proximaConversa: document.getElementById('fbProximaConversa').value
            }]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    showToast('Feedback registrado com sucesso.');
    event.target.reset();
    renderApp();
}

async function adminResetData() {
    if (!confirm('Deseja apagar os dados do Supabase e restaurar os dados iniciais?')) return;
    localStorage.removeItem(STORAGE_COLLABORATORS);
    localStorage.removeItem(STORAGE_COMPETENCIES);
    db.collaborators = JSON.parse(JSON.stringify(initialCollaborators)).map(normalizeCollaborator);
    db.competencies = JSON.parse(JSON.stringify(initialCompetencies)).map(normalizeCompetency);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = null;
    showToast('Dados restaurados.');
    renderApp();
}

function renderApp() {
    if (!currentSession) return;
    if (!isDataLoaded) {
        renderLoadingState();
        return;
    }
    if (uiState.activeTab === 'matriz') uiState.activeTab = 'matriz-exp';
    if (uiState.activeTab === 'polivalencia') uiState.activeTab = 'polivalencia-exp';
    renderNav();
    const container = document.getElementById('app-content');
    const views = {
        dashboard: renderDashboard,
        cadastro: renderCadastro,
        competencias: renderCompetencias,
        'matriz-exp': () => renderMatriz(SECTOR_EXPEDICAO),
        'matriz-out': () => renderMatriz(SECTOR_OUTBOUND),
        'polivalencia-exp': () => renderPolivalencia(SECTOR_EXPEDICAO),
        'polivalencia-out': () => renderPolivalencia(SECTOR_OUTBOUND),
        absenteismo: renderAbsenteismo,
        admin: renderAdministracao
    };
    container.innerHTML = (views[uiState.activeTab] || renderDashboard)();
    createIcons();
}

document.addEventListener('DOMContentLoaded', () => {
    createIcons();
    checkAuth();
});
</script>
</body>
</html>
