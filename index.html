function getSupabaseClient() {
    if (supabaseClient) return supabaseClient;
    if (!window.supabase || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('COLE_SUA_CHAVE')) return null;
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
        }
    });
    return supabaseClient;
}

function loadLocalArray(key, fallback) {
    try {
        const parsed = JSON.parse(localStorage.getItem(key));
        return Array.isArray(parsed) ? parsed : JSON.parse(JSON.stringify(fallback));
    } catch (error) {
        return JSON.parse(JSON.stringify(fallback));
    }
}

function isExpeditionRecord(record) {
    // Registros antigos sem setor pertencem ao modelo original de Expedicao.
    return !record?.sector || record.sector === SECTOR_EXPEDICAO;
}

function getFallbackState() {
    return buildExpeditionState(
        loadLocalArray(STORAGE_COLLABORATORS, initialCollaborators),
        loadLocalArray(STORAGE_COMPETENCIES, initialCompetencies)
    );
}

async function loadData() {
    const client = getSupabaseClient();
    if (!client) {
        db = getFallbackState();
        isDataLoaded = true;
        showToast('Configure a chave anon do Supabase para carregar o banco.', 'error');
        return;
    }

    try {
        const { data, error } = await client
            .from(SUPABASE_STATE_TABLE)
            .select('state_key,state_value')
            .in('state_key', [APP_STATE_COLLABORATORS, APP_STATE_COMPETENCIES]);

        if (error) throw error;

        const rows = Object.fromEntries((data || []).map(row => [row.state_key, row.state_value]));
        const localFallback = getFallbackState();
        const collaborators = Array.isArray(rows[APP_STATE_COLLABORATORS])
            ? rows[APP_STATE_COLLABORATORS]
            : localFallback.collaborators;
        const competencies = Array.isArray(rows[APP_STATE_COMPETENCIES])
            ? rows[APP_STATE_COMPETENCIES]
            : localFallback.competencies;

        const expeditionCollaborators = collaborators.filter(isExpeditionRecord);
        const expeditionCompetencies = competencies.filter(isExpeditionRecord);
        const removedNonExpeditionRecords = expeditionCollaborators.length !== collaborators.length || expeditionCompetencies.length !== competencies.length;
        db = buildExpeditionState(collaborators, competencies);

        if (!rows[APP_STATE_COLLABORATORS] || !rows[APP_STATE_COMPETENCIES] || removedNonExpeditionRecords) {
            await saveData(false);
        }

        isDataLoaded = true;
    } catch (error) {
        console.error('Erro ao carregar Supabase:', error);
        db = getFallbackState();
        isDataLoaded = true;
        showToast(`Erro ao carregar Supabase: ${error.message}`, 'error');
    }
}

function normalizeCollaborator(c) {
    return {
        ...c,
        sector: SECTOR_EXPEDICAO,
        role: legacyRoleMap[c.role] || c.role || 'Auxiliar Operacional',
        warnings: c.warnings || [],
        trainings: c.trainings || [],
        history: c.history || [],
        scores: c.scores || {},
        gaps: c.gaps || [],
        absenteismo: c.absenteismo || [],
        feedbacks: c.feedbacks || [],
        // Campos novos sao normalizados para manter compatibilidade com dados antigos.
        performanceEvaluations: c.performanceEvaluations || [],
        competencyEvaluations: c.competencyEvaluations || [],
        logbook: c.logbook || [],
        pdiGoals: c.pdiGoals || []
    };
}

function normalizeCompetency(c) {
    return {
        ...c,
        sector: SECTOR_EXPEDICAO,
        mandatory: Boolean(c.mandatory),
        // Mantem competencias antigas compativeis com o novo cadastro avancado.
        advanced: {
            targetProficiency: c.advanced?.targetProficiency || 'Intermediario',
            renewal: {
                required: Boolean(c.advanced?.renewal?.required),
                validityMonths: c.advanced?.renewal?.required ? Number(c.advanced?.renewal?.validityMonths) || 12 : null
            },
            prerequisiteIds: Array.isArray(c.advanced?.prerequisiteIds) ? c.advanced.prerequisiteIds : [],
            criticality: c.advanced?.criticality || 'Media',
            evidenceMethod: c.advanced?.evidenceMethod || 'Observacao pratica'
        }
    };
}

function buildExpeditionState(collaborators, competencies) {
    const normalizedCompetencies = competencies.filter(isExpeditionRecord).map(normalizeCompetency);
    const validCompetencyIds = new Set(normalizedCompetencies.map(item => item.id));
    const cleanedCompetencies = normalizedCompetencies.map(item => ({
        ...item,
        advanced: {
            ...item.advanced,
            prerequisiteIds: item.advanced.prerequisiteIds.filter(id => validCompetencyIds.has(id))
        }
    }));
    const cleanedCollaborators = collaborators.filter(isExpeditionRecord).map(normalizeCollaborator).map(collaborator => ({
        ...collaborator,
        scores: Object.fromEntries(Object.entries(collaborator.scores).filter(([id]) => validCompetencyIds.has(id))),
        competencyEvaluations: collaborator.competencyEvaluations.filter(item => validCompetencyIds.has(item.competencyId))
    }));
    return { collaborators: cleanedCollaborators, competencies: cleanedCompetencies };
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    }[char]));
}

function todayBr() {
    return new Date().toLocaleDateString('pt-BR');
}

function formatDateBr(value) {
    if (!value) return '-';
    if (String(value).includes('/')) return value;
    const parts = String(value).split('-');
    if (parts.length !== 3) return value;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function toIsoInputDate(value) {
    if (!value) return '';
    const text = String(value);
    if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
    const parts = text.split('/');
    return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : '';
}

async function saveData(showSuccess = false) {
    const client = getSupabaseClient();
    if (!client) {
        showToast('Configure a chave anon do Supabase antes de salvar.', 'error');
        return false;
    }
    if (!currentSession) {
        showToast('Sessao expirada. Entre novamente para salvar.', 'error');
        await checkAuth();
        return false;
    }

    const payload = [
        { state_key: APP_STATE_COLLABORATORS, state_value: db.collaborators, updated_at: new Date().toISOString() },
        { state_key: APP_STATE_COMPETENCIES, state_value: db.competencies, updated_at: new Date().toISOString() }
    ];
    const { error } = await client
        .from(SUPABASE_STATE_TABLE)
        .upsert(payload, { onConflict: 'state_key' });

    if (error) {
        console.error('Erro ao salvar Supabase:', error);
        showToast(`Erro ao salvar no Supabase: ${error.message}`, 'error');
        return false;
    }

    if (showSuccess) showToast('Dados salvos no Supabase.');
    return true;
}

function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const isError = type === 'error';
    toast.className = `p-3 rounded-lg flex items-center shadow-md transform transition-all translate-y-10 opacity-0 ${
        isError ? 'bg-red-100 border border-red-300 text-red-800' : 'bg-green-100 border border-green-300 text-green-800'
    }`;
    toast.innerHTML = `
        <i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="mr-2 w-5 h-5"></i>
        <span>${escapeHtml(msg)}</span>
    `;
    container.appendChild(toast);
    createIcons(toast);
    setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
    setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.remove(), 300);
    }, 3500);
}

async function checkAuth() {
    const client = getSupabaseClient();
    if (!client) {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('app-view').classList.add('hidden');
        showToast('Supabase nao configurado.', 'error');
        createIcons();
        return;
    }

    const { data, error } = await client.auth.getSession();
    if (error) {
        console.error('Erro ao verificar sessao:', error);
        showToast('Nao foi possivel verificar a sessao.', 'error');
    }

    currentSession = data?.session || null;
    const isLogged = Boolean(currentSession);
    document.getElementById('login-view').classList.toggle('hidden', isLogged);
    document.getElementById('app-view').classList.toggle('hidden', !isLogged);
    if (isLogged) {
        if (!isDataLoaded) {
            renderLoadingState();
            await loadData();
        }
        renderApp();
    }
    createIcons();
}

async function doLogin(event) {
    event.preventDefault();
    const client = getSupabaseClient();
    if (!client) {
        showToast('Supabase nao configurado.', 'error');
        return;
    }

    const email = document.getElementById('login_user').value.trim();
    const password = document.getElementById('login_pass').value;
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
        showToast('Email ou senha incorretos.', 'error');
        return;
    }

    currentSession = data.session;
    isDataLoaded = false;
    showToast('Bem-vindo ao Gestao PDO!');
    await checkAuth();
}

async function doLogout() {
    const client = getSupabaseClient();
    if (client) await client.auth.signOut();
    currentSession = null;
    isDataLoaded = false;
    document.getElementById('login_user').value = '';
    document.getElementById('login_pass').value = '';
    await checkAuth();
}

function scoreToLevel(score) {
    if (score > 0 && score <= 2) return 1;
    if (score > 2 && score <= 4) return 2;
    if (score > 4) return 3;
    return 0;
}

function levelLabel(level) {
    return {
        0: 'Nao treinado (N0)',
        1: 'Em treino (N1)',
        2: 'Autonomo (N2)',
        3: 'Especialista (N3)'
    }[level] || 'Nao treinado (N0)';
}

function renderDashboard() {
    const active = db.collaborators.filter(c => c.status !== 'Desligado');
    const evaluated = active.filter(c => c.performanceEvaluations.length);
    const pendingPdis = active.flatMap(c => c.pdiGoals).filter(goal => goal.status !== 'Concluida');
    const overduePdis = pendingPdis.filter(goal => goal.deadline && goal.deadline < todayIsoLocal());
    const warningCount = active.reduce((total, c) => total + c.warnings.length, 0);

    const requiredSlots = active.reduce((total, collaborator) =>
        total + getCompetenciesBySector(collaborator.sector).filter(comp => comp.mandatory).length, 0);
    const autonomousSlots = active.reduce((total, collaborator) =>
        total + getCompetenciesBySector(collaborator.sector).filter(comp => comp.mandatory && Number(collaborator.scores[comp.id]) >= 2).length, 0);
    const coverage = requiredSlots ? Math.round((autonomousSlots / requiredSlots) * 100) : 0;
    const averagePerformance = evaluated.length
        ? evaluated.reduce((sum, c) => sum + Number(c.performanceEvaluations[0].finalScore || 0), 0) / evaluated.length
        : 0;

    const alerts = [];
    const sectorStats = sectorsList.map(sector => {
        const people = getActiveCollaboratorsBySector(sector);
        const competencies = getCompetenciesBySector(sector);
        const totalSlots = people.length * competencies.length;
        const coveredSlots = people.reduce((total, person) => total + competencies.filter(comp => Number(person.scores[comp.id]) >= 2).length, 0);
        const sectorCoverage = totalSlots ? Math.round((coveredSlots / totalSlots) * 100) : 0;
        const evaluatedPeople = people.filter(person => person.performanceEvaluations.length);
        const performanceAverage = evaluatedPeople.length
            ? evaluatedPeople.reduce((sum, person) => sum + Number(person.performanceEvaluations[0].finalScore || 0), 0) / evaluatedPeople.length
            : 0;

        competencies.forEach(comp => {
            const specialists = people.filter(person => Number(person.scores[comp.id]) === 3).length;
            const minimum = ['Alta', 'Critica'].includes(comp.advanced?.criticality) ? 2 : 1;
            if (specialists < minimum) alerts.push({
                type: comp.advanced?.criticality === 'Critica' ? 'danger' : 'warning',
                sector,
                message: `${comp.name}: ${specialists} multiplicador(es); recomendado ${minimum}.`
            });
        });

        return {
            sector,
            people: people.length,
            competencies: competencies.length,
            coverage: sectorCoverage,
            performanceAverage,
            pendingPdis: people.reduce((total, person) => total + person.pdiGoals.filter(goal => goal.status !== 'Concluida').length, 0)
        };
    });

    if (overduePdis.length) alerts.unshift({ type: 'danger', sector: '', message: `${overduePdis.length} meta(s) de PDI estao com prazo vencido.` });

    const recentEvaluations = active.flatMap(collaborator => [
        ...collaborator.performanceEvaluations.map(item => ({
            collaborator: collaborator.name,
            label: `Desempenho · ${item.cycle}`,
            date: item.date,
            result: Number(item.finalScore || 0).toFixed(2)
        })),
        ...collaborator.competencyEvaluations.map(item => ({
            collaborator: collaborator.name,
            label: item.competencyName,
            date: item.date,
            result: levelLabel(item.level)
        }))
    ]).sort((a, b) => String(b.date).localeCompare(String(a.date))).slice(0, 6);

    const cards = [
        { label: 'Colaboradores ativos', value: active.length, detail: `${sectorsList.length} setores monitorados`, icon: 'users', style: 'blue' },
        { label: 'Cobertura obrigatoria', value: `${coverage}%`, detail: `${autonomousSlots} de ${requiredSlots} dominios`, icon: 'shield-check', style: coverage >= 80 ? 'emerald' : 'amber' },
        { label: 'Media de desempenho', value: averagePerformance.toFixed(2), detail: `${evaluated.length} avaliado(s)`, icon: 'radar', style: 'violet' },
        { label: 'PDIs em andamento', value: pendingPdis.length, detail: `${overduePdis.length} vencido(s)`, icon: 'target', style: overduePdis.length ? 'red' : 'emerald' },
        { label: 'Advertencias', value: warningCount, detail: 'historico total ativo', icon: 'shield-alert', style: warningCount ? 'red' : 'slate' }
    ];
    const cardStyle = {
        blue: 'bg-blue-50 border-blue-100 text-blue-600', emerald: 'bg-emerald-50 border-emerald-100 text-emerald-600',
        amber: 'bg-amber-50 border-amber-100 text-amber-600', violet: 'bg-violet-50 border-violet-100 text-violet-600',
        red: 'bg-red-50 border-red-100 text-red-600', slate: 'bg-slate-50 border-slate-200 text-slate-500'
    };

    return `
        <div class="space-y-6 animate-fade-in">
            <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
                <div><p class="text-xs font-bold uppercase tracking-widest text-blue-600">Visao executiva operacional</p><h2 class="text-2xl font-bold text-slate-900 mt-1">Dashboard PDO</h2><p class="text-sm text-slate-500 mt-1">Cobertura tecnica, desempenho e pontos de atencao da Expedicao.</p></div>
                <div class="flex gap-2"><button onclick="navigate('desempenho')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg flex items-center"><i data-lucide="clipboard-check" class="w-4 h-4 mr-2"></i>Avaliar colaborador</button></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-3">
                ${cards.map(card => `<article class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm"><div class="w-9 h-9 rounded-lg border flex items-center justify-center ${cardStyle[card.style]}"><i data-lucide="${card.icon}" class="w-5 h-5"></i></div><strong class="block text-2xl text-slate-900 mt-3">${card.value}</strong><span class="block text-xs font-semibold text-slate-700 mt-0.5">${card.label}</span><span class="block text-[11px] text-slate-400 mt-1">${card.detail}</span></article>`).join('')}
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                ${sectorStats.map(stat => `
                    <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
                        <div class="flex justify-between items-start gap-3"><div><h3 class="text-lg font-bold text-slate-900">${sectorLabel(stat.sector)}</h3><p class="text-xs text-slate-500">${stat.people} pessoas · ${stat.competencies} competencias</p></div><span class="text-xs font-bold px-2.5 py-1 rounded-full ${stat.coverage >= 80 ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}">${stat.coverage}% coberto</span></div>
                        <div class="mt-5"><div class="flex justify-between text-xs mb-1.5"><span class="text-slate-500">Cobertura de competencias</span><strong>${stat.coverage}%</strong></div><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full ${stat.coverage >= 80 ? 'bg-emerald-500' : 'bg-amber-500'}" style="width:${stat.coverage}%"></div></div></div>
                        <div class="grid grid-cols-2 gap-3 mt-5"><div class="bg-slate-50 rounded-lg p-3"><span class="text-xs text-slate-500">Media desempenho</span><strong class="block text-xl mt-1">${stat.performanceAverage.toFixed(2)}</strong></div><div class="bg-slate-50 rounded-lg p-3"><span class="text-xs text-slate-500">PDIs pendentes</span><strong class="block text-xl mt-1">${stat.pendingPdis}</strong></div></div>
                    </section>
                `).join('')}
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-5 gap-4">
                <section class="xl:col-span-3 bg-white rounded-xl border border-slate-200 shadow-sm p-5">
                    <div class="flex justify-between items-center mb-4"><div><h3 class="font-bold text-slate-900">Prioridades operacionais</h3><p class="text-xs text-slate-500">Riscos de sucessao e prazos que pedem acao.</p></div><span class="text-xs font-bold text-red-600">${alerts.filter(item => item.type === 'danger').length} critico(s)</span></div>
                    <div class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar">
                        ${alerts.length ? alerts.slice(0, 10).map(alert => `<div class="p-3 rounded-lg border flex items-start gap-3 ${alert.type === 'danger' ? 'bg-red-50 border-red-100' : 'bg-amber-50 border-amber-100'}"><i data-lucide="${alert.type === 'danger' ? 'circle-alert' : 'triangle-alert'}" class="w-4 h-4 mt-0.5 shrink-0 ${alert.type === 'danger' ? 'text-red-600' : 'text-amber-600'}"></i><div><span class="text-[10px] uppercase font-bold text-slate-400">${alert.sector ? sectorLabel(alert.sector) : 'Geral'}</span><p class="text-sm text-slate-700">${escapeHtml(alert.message)}</p></div></div>`).join('') : '<div class="text-center py-10 text-emerald-700"><i data-lucide="circle-check" class="w-8 h-8 mx-auto mb-2"></i><p class="text-sm font-semibold">Nenhuma prioridade critica no momento.</p></div>'}
                    </div>
                </section>
                <section class="xl:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm p-5">
                    <h3 class="font-bold text-slate-900">Avaliacoes recentes</h3><p class="text-xs text-slate-500 mt-1">Ultimas movimentacoes registradas.</p>
                    <div class="mt-4 divide-y divide-slate-100">
                        ${recentEvaluations.length ? recentEvaluations.map(item => `<div class="py-3 flex justify-between gap-3"><div class="min-w-0"><strong class="block text-sm truncate">${escapeHtml(item.collaborator)}</strong><span class="block text-xs text-slate-500 truncate">${escapeHtml(item.label)} · ${formatDateBr(item.date)}</span></div><span class="text-xs font-bold text-blue-700 shrink-0">${escapeHtml(item.result)}</span></div>`).join('') : '<p class="text-sm text-slate-500 py-10 text-center">Nenhuma avaliacao registrada.</p>'}
                    </div>
                </section>
            </div>
        </div>
    `;
}

const fichaRecordCollections = {
    warning: 'warnings',
    gap: 'gaps',
    performance: 'performanceEvaluations',
    absence: 'absenteismo'
};

function openFichaRecordEditor(type, index) {
    const collaborator = getSelectedColab();
    const collection = fichaRecordCollections[type];
    if (!collaborator || !collection || !collaborator[collection]?.[index]) return;
    uiState.fichaRecordEditor = {
        type,
        index,
        record: JSON.parse(JSON.stringify(collaborator[collection][index]))
    };
    renderApp();
}

function closeFichaRecordEditor() {
    uiState.fichaRecordEditor = null;
    renderApp();
}

async function deleteFichaRecord(type, index) {
    const collaborator = getSelectedColab();
    const collection = fichaRecordCollections[type];
    if (!collaborator || !collection || !collaborator[collection]?.[index]) return;
    const labels = { warning: 'advertencia', gap: 'gap', performance: 'avaliacao de desempenho', absence: 'registro de absenteismo' };
    if (!confirm(`Excluir este ${labels[type]}? Esta acao nao pode ser desfeita.`)) return;

    collaborator[collection].splice(index, 1);
    collaborator.history = [{ date: todayBr(), event: `${labels[type]} excluido da ficha` }, ...collaborator.history];
    if (!await saveData()) return;
    uiState.fichaRecordEditor = null;
    showToast('Registro excluido com sucesso.');
    renderApp();
}

function splitFichaList(value) {
    return String(value || '').split(',').map(item => item.trim()).filter(Boolean);
}

async function saveFichaRecordEdit(event) {
    event.preventDefault();
    const collaborator = getSelectedColab();
    const editor = uiState.fichaRecordEditor;
    const collection = fichaRecordCollections[editor?.type];
    if (!collaborator || !editor || !collection) return;

    const original = collaborator[collection][editor.index];
    let updated;
    if (editor.type === 'warning') {
        updated = { ...original, date: document.getElementById('edit-record-date').value, type: document.getElementById('edit-warning-type').value, reason: document.getElementById('edit-warning-reason').value.trim(), action: document.getElementById('edit-warning-action').value.trim(), evaluator: document.getElementById('edit-warning-evaluator').value.trim() };
    } else if (editor.type === 'gap') {
        updated = { ...original, date: document.getElementById('edit-record-date').value, gap: document.getElementById('edit-gap-text').value.trim(), impact: document.getElementById('edit-gap-impact').value, measure: document.getElementById('edit-gap-measure').value.trim() };
    } else if (editor.type === 'absence') {
        updated = { ...original, date: document.getElementById('edit-record-date').value, justificados: splitFichaList(document.getElementById('edit-absence-justified').value), naoJustificados: splitFichaList(document.getElementById('edit-absence-unjustified').value) };
    } else {
        const scores = Object.fromEntries(performanceBlocks.flatMap(block => block.criteria.map(item => [item.id, Number(document.getElementById(`edit-performance-${item.id}`).value)])));
        const summary = calculatePerformanceSummary(scores);
        updated = { ...original, cycle: document.getElementById('edit-performance-cycle').value.trim(), date: document.getElementById('edit-record-date').value, evaluator: document.getElementById('edit-performance-evaluator').value.trim(), notes: document.getElementById('edit-performance-notes').value.trim(), scores, blockScores: summary.blockScores, finalScore: summary.weightedTotal };
    }

    collaborator[collection][editor.index] = updated;
    collaborator.history = [{ date: todayBr(), event: 'Registro da ficha editado' }, ...collaborator.history];
    if (!await saveData()) return;
    uiState.fichaRecordEditor = null;
    showToast('Registro atualizado com sucesso.');
    renderApp();
}

            </form>
        </div>
    `;
}

async function cadSaveColab(event) {
    event.preventDefault();
    const form = uiState.editColabForm;
    const updatedColab = normalizeCollaborator({
        ...form,
        trainings: form.trainingsText.split(',').map(t => t.trim()).filter(Boolean),
        history: [{ date: todayBr(), event: 'Dados da ficha atualizados' }, ...form.history]
    });
    delete updatedColab.trainingsText;
    db.collaborators = db.collaborators.map(c => c.id === updatedColab.id ? updatedColab : c);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = updatedColab.id;
    uiState.isEditingColab = false;
    uiState.editColabForm = null;
    showToast('Ficha atualizada com sucesso!');
    renderApp();
}

function cadShowDeleteConfirm(show) {
    uiState.showDeleteColabConfirm = show;
    renderApp();
}

async function cadDeleteColab() {
    db.collaborators = db.collaborators.filter(c => c.id !== uiState.selectedColabId);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = null;
    uiState.isEditingColab = false;
    showToast('Colaborador removido.');
    renderApp();
}

function compEditClick(id) {
    uiState.editingCompId = id;
    uiState.editCompForm = { ...db.competencies.find(c => c.id === id) };
    uiState.showDeleteCompConfirm = null;
    renderApp();
}

function compUpdateField(field, value) {
    uiState.editCompForm[field] = value;
}

function compUpdateMandatory(value) {
    uiState.editCompForm.mandatory = value === 'true';
}

async function compSave() {
    if (!uiState.editCompForm.name.trim()) return;
    db.competencies = db.competencies.map(c => c.id === uiState.editingCompId ? normalizeCompetency(uiState.editCompForm) : c);
    const saved = await saveData();
    if (!saved) return;
    uiState.editingCompId = null;
    uiState.editCompForm = null;
    showToast('Competencia atualizada.');
    renderApp();
}

function compCancelEdit() {
    uiState.editingCompId = null;
    uiState.editCompForm = null;
    renderApp();
}

function compShowDelete(id) {
    uiState.showDeleteCompConfirm = id;
    renderApp();
}

async function compDelete(id) {
    db.competencies = db.competencies.filter(c => c.id !== id);
    db.collaborators = db.collaborators.map(c => {
        const scores = { ...c.scores };
        delete scores[id];
        return { ...c, scores };
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.showDeleteCompConfirm = null;
    uiState.editingCompId = null;
    showToast('Competencia removida.');
    renderApp();
}

        1: 'bg-yellow-400 border-yellow-500',

function renderPolivalencia(sector = SECTOR_EXPEDICAO) {
    const competencies = getCompetenciesBySector(sector);
    const ranking = db.collaborators.filter(c => c.sector === sector).map(c => {
        const masteredCount = competencies.filter(comp => (c.scores[comp.id] || 0) >= 2).length;
        const percent = masteredCount / (competencies.length || 1);
        const stars = percent >= 0.8 ? 5 : percent >= 0.6 ? 4 : percent >= 0.4 ? 3 : percent >= 0.2 ? 2 : percent > 0 ? 1 : 0;
        return { ...c, masteredCount, stars };
    }).sort((a, b) => b.masteredCount - a.masteredCount);

    return `
        <div class="space-y-4 md:space-y-6 animate-fade-in">
            <h2 class="text-xl md:text-2xl font-bold text-slate-800">Ranking de Polivalencia - ${sectorLabel(sector)}</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                ${ranking.map((colab, index) => `
                    <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col relative overflow-hidden">
                        ${index === 0 ? '<div class="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-bl-lg">#1</div>' : ''}
                        <h3 class="text-base md:text-lg font-bold text-slate-800 pr-12">${escapeHtml(colab.name)}</h3>
                        <p class="text-xs md:text-sm text-slate-500 mb-4">${escapeHtml(colab.role)}</p>
                        <div class="flex items-center mb-2">
                            <span class="text-3xl font-bold text-blue-600 mr-2">${colab.masteredCount}</span>
                            <span class="text-sm text-slate-600">competencias dominadas<br>(nivel 2 ou 3)</span>
                        </div>
                        <div class="flex text-yellow-400 mt-auto pt-4 border-t border-slate-100">
                            ${Array.from({ length: 5 }).map((_, i) => `<i data-lucide="star" class="w-5 h-5 ${i < colab.stars ? 'fill-current text-yellow-400' : 'text-slate-200'}"></i>`).join('')}
                        </div>
                    </div>
                `).join('') || '<div class="bg-white border border-slate-200 rounded-xl p-8 text-center text-slate-500">Nenhum colaborador encontrado para este setor.</div>'}
            </div>
        </div>
    `;
}

function absenteeismHandleFile(input) {
    const file = input.files[0];
    if (!file) {
        uiState.tempAbsenteismoImage = null;
        return;
    }
    if (file.type === 'application/pdf') {
        showToast('PDF selecionado. Para visualizacao, prefira imagem.', 'error');
        uiState.tempAbsenteismoImage = null;
        return;
    }
    const reader = new FileReader();
    reader.onload = event => { uiState.tempAbsenteismoImage = event.target.result; };
    reader.readAsDataURL(file);
}

function absenteeismToggleOutro(checkbox) {
    const input = document.getElementById('absOutroObs');
    input.disabled = !checkbox.checked;
    if (!checkbox.checked) input.value = '';
    if (checkbox.checked) input.focus();
}

async function absenteeismSubmit(event) {
    event.preventDefault();
    const colabId = document.getElementById('absColab').value;
    const date = document.getElementById('absDate').value;
    const justificados = Array.from(document.querySelectorAll('input[name="justificado"]:checked')).map(el => el.value);
    const naoJustificados = Array.from(document.querySelectorAll('input[name="naoJustificado"]:checked')).map(el => el.value);
    const outroObs = document.getElementById('absOutroObs').value.trim();

    if (!colabId || !date) {
        showToast('Preencha colaborador e data.', 'error');
        return;
    }
    if (!justificados.length && !naoJustificados.length) {
        showToast('Selecione ao menos um motivo.', 'error');
        return;
    }
    const finalJustificados = justificados.map(value => value === 'Outro' && outroObs ? `Outro: ${outroObs}` : value);
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== colabId) return c;
        return normalizeCollaborator({
            ...c,
            absenteismo: [...c.absenteismo, { date, justificados: finalJustificados, naoJustificados, image: uiState.tempAbsenteismoImage }],
            history: [{ date: todayBr(), event: 'Entrevista de absenteismo registrada' }, ...c.history]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.tempAbsenteismoImage = null;
    showToast('Entrevista gravada com sucesso!');
    event.target.reset();
}

let performanceRadarChart = null;

function todayIsoLocal() {
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    return new Date(now.getTime() - offset).toISOString().slice(0, 10);
}

function performanceSetSector(value) {
    uiState.performanceSector = value;

function performanceSelectColab(value) {

}

function getPerformanceCollaborator() {

}

function performanceSelectCompetency(value) {

function performanceToggleCompetencyCriterion(id) {

function getPerformanceDraftScores(collaborator) {
    const latest = collaborator?.performanceEvaluations?.[0];
    return Object.fromEntries(performanceBlocks.flatMap(block =>
        block.criteria.map(criterion => [criterion.id, Number(latest?.scores?.[criterion.id]) || 3])
    ));
}

function calculatePerformanceSummary(scores) {
    const blockScores = {};
    let weightedTotal = 0;
    performanceBlocks.forEach(block => {
        const values = block.criteria.map(item => Number(scores[item.id]) || 0);
        const average = values.reduce((sum, value) => sum + value, 0) / values.length;
        blockScores[block.id] = average;
        weightedTotal += average * (block.weight / 100);
    });
    return { blockScores, weightedTotal };
}

function collectPerformanceScores() {
    return Object.fromEntries(performanceBlocks.flatMap(block => block.criteria.map(item => {
        const input = document.getElementById(`performance-${item.id}`);
        return [item.id, Number(input?.value) || 1];
    })));
}

function performanceScoreChanged() {
    const scores = collectPerformanceScores();
    const summary = calculatePerformanceSummary(scores);
    performanceBlocks.forEach(block => {
        const element = document.getElementById(`block-score-${block.id}`);
        if (element) element.textContent = summary.blockScores[block.id].toFixed(1);
    });
    const total = document.getElementById('performance-total');
    if (total) total.textContent = summary.weightedTotal.toFixed(2);
    updatePerformanceRadar(scores);
}

function initializePerformanceRadar(scores) {
    const canvas = document.getElementById('performance-radar');
    if (!canvas || typeof Chart === 'undefined') return;
    if (performanceRadarChart) performanceRadarChart.destroy();

    const criteria = performanceBlocks.flatMap(block => block.criteria);
    performanceRadarChart = new Chart(canvas, {
        type: 'radar',
        data: {
            labels: criteria.map(item => item.label),
            datasets: [{
                label: 'Nota atual',
                data: criteria.map(item => Number(scores[item.id]) || 0),
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.16)',
                pointBackgroundColor: '#2563eb',
                pointBorderColor: '#ffffff',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    min: 0,
                    max: 5,
                    ticks: { stepSize: 1, backdropColor: 'transparent' },
                    pointLabels: { font: { size: 11, weight: '600' }, color: '#475569' },
                    grid: { color: '#cbd5e1' },
                    angleLines: { color: '#e2e8f0' }
                }
            },
            plugins: { legend: { position: 'bottom' } }
        }
    });
}

function updatePerformanceRadar(scores) {
    if (!performanceRadarChart) return initializePerformanceRadar(scores);
    const criteria = performanceBlocks.flatMap(block => block.criteria);
    performanceRadarChart.data.datasets[0].data = criteria.map(item => Number(scores[item.id]) || 0);
    performanceRadarChart.update();
}

async function savePerformanceEvaluation(event) {
    event.preventDefault();
    const collaborator = getPerformanceCollaborator();
    if (!collaborator) return showToast('Selecione um colaborador.', 'error');

    const scores = collectPerformanceScores();
    const summary = calculatePerformanceSummary(scores);
    const evaluation = {
        id: `eval-${Date.now()}`,
        cycle: document.getElementById('performance-cycle').value.trim(),
        date: document.getElementById('performance-date').value,
        evaluator: document.getElementById('performance-evaluator').value.trim(),
        notes: document.getElementById('performance-notes').value.trim(),
        scores,
        blockScores: summary.blockScores,
        finalScore: summary.weightedTotal
    };

    collaborator.performanceEvaluations = [evaluation, ...collaborator.performanceEvaluations];
    collaborator.history = [{ date: todayBr(), event: `Avaliacao de desempenho: ${evaluation.cycle} - nota ${evaluation.finalScore.toFixed(2)}` }, ...collaborator.history];
    if (!await saveData()) return;
    showToast('Avaliacao de desempenho salva.');
    renderApp();
}

}

async function savePdiGoals(event) {
    event.preventDefault();
    const collaborator = getPerformanceCollaborator();
    if (!collaborator) return showToast('Selecione um colaborador.', 'error');

    const newGoals = [];
    for (let index = 1; index <= uiState.pdiGoalCount; index += 1) {
        const goal = document.getElementById(`pdi-goal-${index}`).value.trim();
        const action = document.getElementById(`pdi-action-${index}`).value.trim();
        const indicator = document.getElementById(`pdi-indicator-${index}`).value.trim();
        const deadline = document.getElementById(`pdi-deadline-${index}`).value;
        if (!goal && !action && !indicator && !deadline) continue;
        if (!goal || !action || !indicator || !deadline) {
            return showToast(`Complete todos os campos da meta ${index}.`, 'error');
        }
        newGoals.push({ id: `pdi-${Date.now()}-${index}`, goal, action, indicator, deadline, createdAt: todayIsoLocal(), status: 'Em andamento' });
    }
    if (!newGoals.length) return showToast('Registre ao menos uma meta de PDI.', 'error');

    collaborator.pdiGoals = [...newGoals, ...collaborator.pdiGoals];
    if (!await saveData()) return;
    uiState.pdiGoalCount = 1;
    showToast(`${newGoals.length} meta(s) adicionada(s) ao PDI.`);
    renderApp();
}

    collaborator.pdiGoals = collaborator.pdiGoals.map(goal => goal.id === goalId
        ? { ...goal, status: goal.status === 'Concluida' ? 'Em andamento' : 'Concluida' }

    if (!await saveData()) return;
    showToast('Status da meta atualizado.');
    renderApp();
}

                    <div class="border-t border-slate-200 mt-6 pt-5">

                                    <div class="flex justify-between gap-3"><strong class="text-sm">${escapeHtml(goal.goal)}</strong><span class="text-[10px] uppercase font-bold ${goal.status === 'Concluida' ? 'text-emerald-700' : 'text-blue-700'}">${escapeHtml(goal.status)}</span></div>
                                    <p class="text-xs text-slate-600 mt-2"><b>Acao:</b> ${escapeHtml(goal.action)}</p><p class="text-xs text-slate-600 mt-1"><b>Sucesso:</b> ${escapeHtml(goal.indicator)}</p>
                                    <div class="flex justify-between items-center mt-3"><span class="text-xs text-slate-500">Prazo: ${formatDateBr(goal.deadline)}</span><button type="button" onclick="togglePdiGoalStatus('${goal.id}')" class="text-xs font-semibold text-emerald-700 hover:underline">${goal.status === 'Concluida' ? 'Reabrir' : 'Marcar concluida'}</button></div>
                                </article>

                    </div>
                </section>

}

function adminSetTab(tab) {
    uiState.activeAdminTab = tab;
    renderApp();
}

function adminEvalColabChange(value) {
    uiState.evalColabId = value;
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminEvalCompChange(value) {
    uiState.evalCompId = value;
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminSetEvalSector(value) {
    uiState.evalSector = value;
    uiState.evalColabId = '';
    uiState.evalCompId = '';
    uiState.evalCheckedItems.clear();
    renderApp();
}

function adminSetGapSector(value) {
    uiState.gapSector = value;
    renderApp();
}

function adminSetFeedbackSector(value) {
    uiState.feedbackSector = value;
    renderApp();
}

function adminToggleCheck(id) {
    if (uiState.evalCheckedItems.has(id)) uiState.evalCheckedItems.delete(id);
    else uiState.evalCheckedItems.add(id);
    renderApp();
}

async function adminSaveEval(event) {
    event.preventDefault();
    if (!uiState.evalColabId || !uiState.evalCompId) {
        showToast('Selecione colaborador e competencia.', 'error');
        return;
    }
    const level = scoreToLevel(uiState.evalCheckedItems.size);
    const compName = db.competencies.find(comp => comp.id === uiState.evalCompId)?.name || 'Competencia';
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== uiState.evalColabId) return c;
        return normalizeCollaborator({
            ...c,
            scores: { ...c.scores, [uiState.evalCompId]: level },
            history: [{ date: todayBr(), event: `Avaliacao: ${compName} - ${levelLabel(level)}` }, ...c.history]
        });
    });
    const saved = await saveData();
    if (!saved) return;
    uiState.evalCheckedItems.clear();
    showToast('Avaliacao salva com sucesso.');
    renderApp();
}

async function adminAddColab(event) {
    event.preventDefault();
    const name = document.getElementById('newColabName').value.trim();
    if (!name) return;
    const newColab = normalizeCollaborator({
        id: `col${Date.now()}`,
        name,
        role: document.getElementById('newColabRole').value,
        sector: document.getElementById('newColabSector').value,
        shift: document.getElementById('newColabShift').value,
        admission: document.getElementById('newColabAdmissao').value || new Date().toISOString().split('T')[0],
        status: 'Ativo',
        timeInRole: 'Recem adicionado',
        warnings: [],
        trainings: [],
        history: [{ date: todayBr(), event: 'Adicionado via sistema' }],
        scores: {},
        gaps: [],
        absenteismo: [],
        feedbacks: []
    });
    db.collaborators.push(newColab);
    const saved = await saveData();
    if (!saved) return;
    showToast('Colaborador adicionado com sucesso.');
    event.target.reset();
    renderApp();
}

function openAdvancedCompetencyModal() {
    const modal = document.getElementById('advanced-competency-modal');
    if (!modal) return;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.getElementById('advanced-proficiency')?.focus();
}

function closeAdvancedCompetencyModal(event) {
    // Clique no fundo fecha o modal; cliques no painel interno nao propagam o fechamento.
    if (event && event.target.id !== 'advanced-competency-modal') return;
    const modal = document.getElementById('advanced-competency-modal');
    if (!modal) return;
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function toggleCompetencyRenewal(checked) {
    const validityGroup = document.getElementById('advanced-validity-group');
    const validityInput = document.getElementById('advanced-validity-months');
    validityGroup?.classList.toggle('hidden', !checked);
    if (validityInput) {
        validityInput.disabled = !checked;
        validityInput.required = checked;
        if (checked && !validityInput.value) validityInput.value = '12';
    }
}

async function adminAddComp(event) {
    event.preventDefault();
    const name = document.getElementById('newCompName').value.trim();
    if (!name) return;
    const renewalRequired = document.getElementById('advanced-renewal').checked;
    const prerequisiteIds = [...document.querySelectorAll('input[name="advancedPrerequisite"]:checked')].map(input => input.value);

    // Um unico objeto reune dados basicos e avancados para persistencia/API.
    const competency = normalizeCompetency({
        id: `c${Date.now()}`,
        name,
        sector: document.getElementById('newCompSector').value,
        category: document.getElementById('newCompCategory').value,
        mandatory: document.getElementById('newCompMandatory').value === 'true',
        advanced: {
            targetProficiency: document.getElementById('advanced-proficiency').value,
            renewal: {
                required: renewalRequired,
                validityMonths: renewalRequired ? Number(document.getElementById('advanced-validity-months').value) : null
            },
            prerequisiteIds,
            criticality: document.getElementById('advanced-criticality').value,
            evidenceMethod: document.getElementById('advanced-evidence').value
        }
    });
    db.competencies.push(competency);
    const saved = await saveData();
    if (!saved) return;
    showToast('Competencia adicionada com sucesso.');
    event.target.reset();
    renderApp();
}

async function adminAddGap(event) {
    event.preventDefault();
    const colabId = document.getElementById('gapColab').value;
    if (!colabId) return;
    db.collaborators = db.collaborators.map(c => {
        if (c.id !== colabId) return c;
        return normalizeCollaborator({
            ...c,
            gaps: [...c.gaps, {
                date: todayBr(),
                gap: document.getElementById('gapText').value,
                impact: document.getElementById('gapImpact').value,

async function adminResetData() {
    if (!confirm('Deseja apagar os dados do Supabase e restaurar os dados iniciais?')) return;
    localStorage.removeItem(STORAGE_COLLABORATORS);
    localStorage.removeItem(STORAGE_COMPETENCIES);
    db.collaborators = JSON.parse(JSON.stringify(initialCollaborators)).map(normalizeCollaborator);
    db.competencies = JSON.parse(JSON.stringify(initialCompetencies)).map(normalizeCompetency);
    const saved = await saveData();
    if (!saved) return;
    uiState.selectedColabId = null;
    showToast('Dados restaurados.');
    renderApp();
}

function renderApp() {
    if (!currentSession) return;
    if (!isDataLoaded) {
        renderLoadingState();
        return;
    }
    if (uiState.activeTab === 'matriz') uiState.activeTab = 'matriz-exp';
    if (uiState.activeTab === 'polivalencia') uiState.activeTab = 'polivalencia-exp';
    renderNav();
    const container = document.getElementById('app-content');
    const views = {
        dashboard: renderDashboard,
        desempenho: renderPerformance,
        cadastro: renderCadastro,
        competencias: renderCompetencias,
        'matriz-exp': () => renderMatriz(SECTOR_EXPEDICAO),
        'polivalencia-exp': () => renderPolivalencia(SECTOR_EXPEDICAO),
        absenteismo: renderAbsenteismo,
        admin: renderAdministracao
    };
    container.innerHTML = (views[uiState.activeTab] || renderDashboard)();
    createIcons();
    // O canvas so existe depois que o HTML da view foi inserido no DOM.
    if (uiState.activeTab === 'desempenho' && getPerformanceCollaborator()) {
        initializePerformanceRadar(getPerformanceDraftScores(getPerformanceCollaborator()));
    }
}

document.addEventListener('DOMContentLoaded', () => {
    createIcons();
    checkAuth();
});
</script>
